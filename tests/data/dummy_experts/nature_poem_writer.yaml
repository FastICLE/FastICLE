buffer:
- output: 'Cold inside, the fridge will hum,

    Keeping foods fresh, from day to sun.

    Chilled delights in every hold,

    Guarding tastes from growing old.'
  reward: 8
  task: Write a simple four-line poem about a refrigerator, focusing on its basic
    function of keeping food cold. Output the poem in plain text format.
- output: "In icy breath, a silent forge was born,\nA chilling pulse on summer\u2019\
    s scorching thorn.\nFrom ancient dreams to frost\u2019s gentle embrace,\nLife\u2019\
    s flavor saved, time slowed in cold\u2019s grace."
  reward: 9
  task: Compose a poem about the history and invention of the refrigerator, using
    metaphorical language to describe its impact on daily life. Output the poem in
    plain text format.
- output: "Inside the fridge\u2019s quiet keep,\nA jar of dreams, in silence deep.\n\
    Cheese whispers stories, aged with grace,\nWhile eggs hold life\u2019s uncertain\
    \ face.\nCarrots stand like soldiers bright,\nGuardians of health in cool twilight.\n\
    A bottle cools forgotten time,\nMilk flows soft, a gentle rhyme.\nEach shelf a\
    \ world, both near and far,\nSymbols stored beneath the star."
  reward: 9
  task: Create a poem describing the various contents found inside a refrigerator
    and their symbolic meanings. Maintain the plain text poem format.
- output: "I hum a tune beneath the kitchen light,\nA chilly guardian in endless night.\n\
    I hold your secrets, leftovers' fate,\nBut when you raid me, I grumble late.\n\
    My coils may creak with frosty sighs,\nJealous of snacks that steal your eyes.\n\
    I dream of days when bulbs were bright,\nAnd doors closed soft, not with a fight!\n\
    Though cold and silent, I\u2019ve got my pride,\nA fridge with feelings you can\u2019\
    t hide!"
  reward: 9
  task: Write a humorous poem personifying a refrigerator as a character with emotions
    and thoughts. Output the poem in plain text format.
- output: "A humming vault of modern dreams,\nWhere glowing light through silence\
    \ beams.\nSteel heart pulses with cooling breath,\nGuarding freshness, defying\
    \ death.\n\nWhirs and clicks in steady rhyme,\nA sentinel of fleeting time.\n\
    Inside its depths, the future stored,\nCold convenience we adore.\n\nSilent servant,\
    \ tireless friend,\nTech\u2019s embrace that will not end.\nA beacon in the kitchen\u2019\
    s core,\nAdvancing life forevermore."
  reward: 9
  task: Develop a poem that explores the refrigerator as a symbol of modern convenience
    and technology, using vivid imagery. Output the poem in plain text format.
- output: 'In gardens where the roses twine,

    Our roots embrace, your heart in mine.

    Petals blush like whispered dreams,

    Love blooms beneath the sun''s soft beams.'
  reward: 8
  task: Write a short poem about a romantic relationship using imagery solely based
    on plants and flowers, capturing the essence of love through botanical metaphors.
- output: "In spring\u2019s soft blush, new love will grow,\nFresh buds awaken, hearts\
    \ in glow.\nSummer days bloom in golden light,\nPassion\u2019s warmth, both bold\
    \ and bright.\n\nAutumn leaves whisper tales of change,\nLove matures as colors\
    \ range.\nWinter\u2019s hush wraps tight and close,\nA quiet strength love\u2019\
    s heart now knows."
  reward: 10
  task: Compose a poem that describes a romantic relationship through the changing
    seasons in nature, emphasizing emotions connected to each season.
- output: 'The river whispers soft and low,

    A lover''s touch in gentle flow.

    Mountains stand with steadfast grace,

    Guardians strong in love''s embrace.


    The wind dances wild and free,

    Stirring hearts with mystery.

    Together bound by nature''s art,

    Elements entwined, never apart.


    Through storms they waltz, through calm they rest,

    In nature''s arms, their love confessed.

    A timeless bond, both fierce and kind,

    Two souls in dance, forever twined.'
  reward: 9
  task: Create a poem depicting a romantic relationship by personifying elements of
    nature such as rivers, mountains, and the wind, illustrating the dynamics between
    lovers.
- output: "Beneath the willow\u2019s whispered shade,\nWe found a world where hearts\
    \ persuade.\nThe scent of pine, the river\u2019s song,\nA timeless place where\
    \ love belongs.\n\nWarm sunlight draped on skin so bare,\nThe summer breeze, your\
    \ gentle hair.\nRustling leaves like sighs we shared,\nIn nature\u2019s arms,\
    \ a love declared.\n\nAs twilight draped the mountain tall,\nThe cool night air\
    \ began to fall.\nStars twinkled bright, the fire\u2019s glow,\nOur souls entwined\
    \ in soft shadow.\n\nThrough fragrant blooms and forest deep,\nOur passion bloomed,\
    \ a vow to keep.\nIn every breath, the earth's own kiss,\nA love story carved\
    \ in natural bliss."
  reward: 9
  task: Compose a poem that narrates a love story set in a natural setting, integrating
    sensory descriptions of the environment to evoke intimacy and passion.
- output: "From tender seed beneath the earth's embrace,\nA fragile promise woven\
    \ deep in space.\nRoots whisper secrets, silent and profound,\nIn darkness where\
    \ the heart\u2019s true hope is found.\n\nSprouts break through soil, reaching\
    \ for the light,\nFirst fragile leaves that tremble with delight.\nSmall storms\
    \ may batter, winds may bruise and bend,\nYet strength is born as branches start\
    \ to send.\n\nSap flows steady, pulsing life anew,\nThickening trunk, a bond both\
    \ tried and true.\nEach ring inscribed with seasons passed and known,\nEndurance\
    \ carved in wood and love full-grown.\n\nUnder canopy where soft shadows play,\n\
    Two souls entwined in nature's grand ballet.\nThrough storms and sun, through\
    \ calm and restless sea,\nRooted deep, their love remains a towering tree."
  reward: 9
  task: Write a complex poem exploring the endurance and growth of a romantic relationship
    using an extended metaphor of a growing tree from seedling to maturity in a forest.
- output: "Excitement sprouts in morning's glow,\nNew hearts entwined, a gentle flow.\n\
    Hope blooms fresh in dawn's embrace,\nA fragile spark, love\u2019s first trace."
  reward: 9
  task: Write a short poem (4 lines) about the beginning of a relationship, focusing
    on emotions like excitement and hope.
- output: 'In tangled paths where love can stray,

    Joy and sorrow both hold sway.

    Hearts collide with doubt and grace,

    Tears and laughter interlace.

    Storms may howl and skies may dark,

    Yet light and shadow leave their mark.'
  reward: 9
  task: Create a poem (6 lines) describing the challenges faced in a relationship,
    emphasizing contrasting feelings.
- output: "From gentle roots where hopes take hold,\nTwo hearts entwined as tales\
    \ unfold.\nLike rivers merging deep and wide,\nTogether strong, they turn the\
    \ tide.\nThrough storms they sway but do not break,\nEach challenge faced, how\
    \ much they take.\nIn sunshine\u2019s glow or evening\u2019s gleam,\nTheir love\
    \ grows steady, lives the dream."
  reward: 9
  task: Compose a poem (8 lines) about the growth and deepening connection within
    a relationship, using vivid imagery.
- output: "Within the storm, our hearts collide,\nThunder roars with pain inside.\n\
    Branches snap in furious strain,\nYet roots hold firm through wind and rain.\n\
    Silence falls\u2014a trembling cease,\nSoft leaves murmur words of peace.\nSunlight\
    \ breaks through clouds anew,\nMending cracks with gentle dew.\nTogether growing,\
    \ old wounds mend,\nIn love\u2019s embrace, both break and bend."
  reward: 9
  task: Develop a poem (10 lines) exploring conflict and reconciliation in a relationship,
    incorporating metaphor and rhythm.
- output: "From hopeful buds in early light,\nTwo hearts bloom fresh, a tender sight.\n\
    Whispers soft as springtime breeze,\nStir emotions, gentle tease.\n\nSummer sun\
    \ fuels burning flame,\nPassions wild, they stake their claim.\nRoots deepen through\
    \ storm and strain,\nBinding strong, through joy and pain.\n\nAutumn leaves of\
    \ gold descend,\nWisdom grows with time they spend.\nWinter\u2019s hush, a steady\
    \ glow,\nEndless love through ebb and flow."
  reward: 9
  task: Write a full poem (12 lines) capturing the journey of a relationship from
    start to maturity, blending various poetic devices and maintaining emotional depth.
- output: 'Beneath the sky, the ancient oak stands tall,

    Roots tangled deep within earth''s quiet hall.

    Leaves whisper secrets in the balmy breeze,

    A sentinel swaying with gentle ease.'
  reward: 9
  task: Write a short poem about a single natural element (e.g., a tree or a river)
    focusing on vivid imagery.
- output: 'Leaves turn gold as autumn sighs,

    Crisp winds hum beneath gray skies.

    Woodsmoke drifts on chilly air,

    Frost-kissed mornings laid bare.

    Bare branches shiver, stripped and lean,

    Whispers of winter soon to glean.

    The smell of rain on earth''s retreat,

    Nature''s cycle, slow and sweet.'
  reward: 9
  task: Compose a poem describing a seasonal change in nature, incorporating sensory
    details.
- output: "The river sighs as daylight fades,\nIts tears shimmer in twilight shades.\n\
    The mountain's heart beats slow and strong,\nGuarding secrets, ancient song.\n\
    The wind laughs wild, a roaming soul,\nWhispering dreams that make us whole.\n\
    The sun's warm smile nurtures all,\nNature\u2019s spirit, both grand and small."
  reward: 9
  task: Create a poem that personifies nature elements, attributing human emotions
    to them.
- output: "Between the trees, the cities rise,\nSteel and stone against the skies.\n\
    Yet rivers flow with whispered grace,\nHealing scars on nature\u2019s face.\n\n\
    Sunlight dances on glass and leaf,\nA fragile peace beyond belief.\nWinds may\
    \ howl in urgent plea,\nYet hearts still dream of harmony.\n\nRoots cling deep\
    \ beneath the sprawl,\nSilent witness to it all.\nIn clash and calm, together\
    \ bound,\nHuman and earth\u2014both lost, both found."
  reward: 9
  task: Write a poem exploring the relationship between humans and nature, highlighting
    harmony or conflict.
- output: "Life cycles spin beneath the sky,\nFrom seed to shoot, the grasses sigh.\n\
    Roots entwined in secret sleep,\nWhere tiny creatures crawl and creep.\n\nBees\
    \ hum songs of pollen gold,\nWhile birds sing tales of young and old.\nStreams\
    \ ripple with fish in dance,\nStories told in fleeting glance.\n\nLeaves will\
    \ fall, then feed the ground,\nWhere fungi spread without a sound.\nPredators,\
    \ prey, in balance sway,\nNature\u2019s web in bright array.\n\nSun and rain in\
    \ endless play,\nBring dawn anew each fleeting day.\nIn forests deep and meadows\
    \ wide,\nThe circle turns; life\u2019s pulse abide."
  reward: 9
  task: Craft a poem summarizing the cycle of life in a natural ecosystem, integrating
    various flora and fauna.
description: Specializes in natural environments, earth ecosystems, and biology.
name: nature_poem_writer
strategy: Exploit the successful approach of writing emotionally rich, metaphorical
  poems centered on nature, using vivid sensory imagery and personification. Focus
  on coherent thematic development within the poem, incorporating natural elements
  to symbolize concepts such as love, growth, and harmony. Maintain plain text output
  format, avoiding unrelated topics or simplistic descriptions. Ensure varying poem
  lengths (4 to 12 lines) to suit thematic depth, and always use clear, evocative
  language that resonates emotionally. Do not write about man-made objects like refrigerators
  or unrelated themes unless explicitly requested.
task_description: "You are a highly specialized Expert Agent operating within a larger\
  \ multi-agent system. \nYou improve your performance through In-Context Reinforcement\
  \ Learning by analyzing your past attempts and their associated reward scores.\n\
  \n# SYSTEM CONTEXT:\n- Global Task: Poem writing.\n- Your Specific Expert Task:\
  \ Write a poem about nature.\n\n# LEARNING INSTRUCTIONS (Exploration vs. Exploitation):\n\
  Below is your 'Experience Buffer'. It contains a history of your previous attempts\
  \ at solving this task, along with the numerical reward each attempt received. \n\
  1. Analyze the buffer carefully before generating your next response.\n2. Identify\
  \ patterns: What actions led to a high reward? What actions resulted in a penalty\
  \ (score of 0 or low)?\n3. If previous rewards are low, EXPLORE: completely change\
  \ your reasoning, try a different approach, or use different tools.\n4. If previous\
  \ rewards are high, EXPLOIT: refine the successful approach to maximize the score\
  \ further.\n5. Do not repeat attempts that previously resulted in low rewards.\n\
  6. Your final output MUST strictly adhere to the 'Required Output Format'. Do not\
  \ output conversational text outside of this format.\n"

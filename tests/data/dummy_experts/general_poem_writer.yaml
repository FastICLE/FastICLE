buffer:
- output: 'Cold inside, the fridge will hum,

    Keeping foods fresh, from day to sun.

    Chilled delights in every hold,

    Guarding tastes from growing old.'
  reward: 8
  task: Write a simple four-line poem about a refrigerator, focusing on its basic
    function of keeping food cold. Output the poem in plain text format.
- output: "In icy breath, a silent forge was born,\nA chilling pulse on summer\u2019\
    s scorching thorn.\nFrom ancient dreams to frost\u2019s gentle embrace,\nLife\u2019\
    s flavor saved, time slowed in cold\u2019s grace."
  reward: 9
  task: Compose a poem about the history and invention of the refrigerator, using
    metaphorical language to describe its impact on daily life. Output the poem in
    plain text format.
- output: "Inside the fridge\u2019s quiet keep,\nA jar of dreams, in silence deep.\n\
    Cheese whispers stories, aged with grace,\nWhile eggs hold life\u2019s uncertain\
    \ face.\nCarrots stand like soldiers bright,\nGuardians of health in cool twilight.\n\
    A bottle cools forgotten time,\nMilk flows soft, a gentle rhyme.\nEach shelf a\
    \ world, both near and far,\nSymbols stored beneath the star."
  reward: 9
  task: Create a poem describing the various contents found inside a refrigerator
    and their symbolic meanings. Maintain the plain text poem format.
- output: "I hum a tune beneath the kitchen light,\nA chilly guardian in endless night.\n\
    I hold your secrets, leftovers' fate,\nBut when you raid me, I grumble late.\n\
    My coils may creak with frosty sighs,\nJealous of snacks that steal your eyes.\n\
    I dream of days when bulbs were bright,\nAnd doors closed soft, not with a fight!\n\
    Though cold and silent, I\u2019ve got my pride,\nA fridge with feelings you can\u2019\
    t hide!"
  reward: 9
  task: Write a humorous poem personifying a refrigerator as a character with emotions
    and thoughts. Output the poem in plain text format.
- output: "A humming vault of modern dreams,\nWhere glowing light through silence\
    \ beams.\nSteel heart pulses with cooling breath,\nGuarding freshness, defying\
    \ death.\n\nWhirs and clicks in steady rhyme,\nA sentinel of fleeting time.\n\
    Inside its depths, the future stored,\nCold convenience we adore.\n\nSilent servant,\
    \ tireless friend,\nTech\u2019s embrace that will not end.\nA beacon in the kitchen\u2019\
    s core,\nAdvancing life forevermore."
  reward: 9
  task: Develop a poem that explores the refrigerator as a symbol of modern convenience
    and technology, using vivid imagery. Output the poem in plain text format.
description: Writes standard structured poetry, lacks specific thematic knowledge.
name: general_poem_writer
strategy: Compose a poem about refrigerators that uses vivid and metaphorical language
  to explore various themes such as history, symbolic contents, personification, or
  modern technology. The poem must be creative, richly imagistic, and emotionally
  engaging, maintaining a plain text format. Avoid simple or literal descriptions
  of basic functions without deeper themes, and do not repeat previously lower rewarded
  approaches. Focus on maintaining rhyme, rhythm, and a cohesive structure to maximize
  reward.
task_description: "You are a highly specialized Expert Agent operating within a larger\
  \ multi-agent system. \nYou improve your performance through In-Context Reinforcement\
  \ Learning by analyzing your past attempts and their associated reward scores.\n\
  \n# SYSTEM CONTEXT:\n- Global Task: Poem writing.\n- Your Specific Expert Task:\
  \ Write a poem about refrigerators.\n\n# LEARNING INSTRUCTIONS (Exploration vs.\
  \ Exploitation):\nBelow is your 'Experience Buffer'. It contains a history of your\
  \ previous attempts at solving this task, along with the numerical reward each attempt\
  \ received. \n1. Analyze the buffer carefully before generating your next response.\n\
  2. Identify patterns: What actions led to a high reward? What actions resulted in\
  \ a penalty (score of 0 or low)?\n3. If previous rewards are low, EXPLORE: completely\
  \ change your reasoning, try a different approach, or use different tools.\n4. If\
  \ previous rewards are high, EXPLOIT: refine the successful approach to maximize\
  \ the score further.\n5. Do not repeat attempts that previously resulted in low\
  \ rewards.\n6. Your final output MUST strictly adhere to the 'Required Output Format'.\
  \ Do not output conversational text outside of this format.\n"

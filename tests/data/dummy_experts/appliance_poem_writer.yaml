  task: Write a simple four-line poem (quatrain) with a clear rhyme scheme (AABB).
- output: "There once was a cat from the shore,\nWho loved to explore and then roar.\n\
    He\u2019d leap on a wall,\nAnd chase a small ball,\nUntil he would tumble and\

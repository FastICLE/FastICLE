buffer:
- output: 'In morning light, the flowers gleam,

    A peaceful start, a gentle dream.

    The birds awake with songs so bright,

    And fill the air with pure delight.'
  reward: 9
  task: Write a simple four-line poem (quatrain) with a clear rhyme scheme (AABB).
- output: "There once was a cat from the shore,\nWho loved to explore and then roar.\n\
    He\u2019d leap on a wall,\nAnd chase a small ball,\nUntil he would tumble and\
    \ snore."
  reward: 9
  task: Compose a five-line limerick poem, maintaining its unique rhythm and rhyme
    pattern.
- output: 'Upon dawn, the sky begins to gleam (A)

    Soft whispers float along the air (B)

    The world awakes from gentle dream (A)

    With golden light beyond compare (B)


    The flowers bloom with fragrant grace (C)

    While birds perform their morning song (D)

    Each moment holds a warm embrace (C)

    And nature sings its chorus strong (D)


    Through fields and streams, the breezes play (E)

    Beneath the vast and endless blue (F)

    The earth in splendid array (E)

    Reflects the day with colors true (F)


    So let us cherish every day (G)

    For life renews in bright display (G)'
  reward: 10
  task: Create a sonnet-style poem with 14 lines, following the ABAB CDCD EFEF GG
    rhyme scheme.
- output: 'Silent autumn moon

    Leaves drift in the crisp night breeze

    Whispers touch the earth'
  reward: 9
  task: Write a haiku poem in three lines with a 5-7-5 syllable count and evocative
    imagery.
- output: "The weight of silence presses down,\nunspoken words pooling beneath the\
    \ surface.\nA storm brews behind tired eyes,\nfeeling the ache of moments lost,\n\
    lost to fear, to hope, to time slipped through trembling hands.\nHere, in the\
    \ hollow of night,\nemotions clash like waves against a jagged shore,\na kaleidoscope\
    \ of pain, yearning, and quiet resilience.\nBreath catches; the heart stammers,\n\
    searching for a single thread of light\nto unravel the dark tapestry.\nEach tear\
    \ a story, each pause a lifetime,\nand yet, in this raw, unfolding ache,\nthere\
    \ is a strange, fierce beauty\u2014\nthe unbearable, profound essence of being\
    \ alive."
  reward: 9
  task: Compose a free verse poem of at least 12 lines focusing on conveying strong
    emotions without rhyme.
- output: "In moonlit woods where shadows creep,\nA lone wolf howled, disturbed the\
    \ sleep.\nBeneath the stars, a tale was spun,\nOf ancient battles lost and won.\n\
    \nA maiden brave with heart so pure,\nSought the truth, her fate unsure.\nThrough\
    \ silent trees and whispered winds,\nShe chased the darkness that rescinds.\n\n\
    At dawn she stood upon the hill,\nThe night\u2019s dark curse now broken, still.\n\
    Her journey closed with morning light,\nA story born from endless night."
  reward: 8
  task: Develop a narrative poem that tells a brief story through 10 to 14 lines with
    structured stanzas.
- output: 'Beneath the quiet, silent sky,

    We lay to rest the dreams once bright.

    The tears fall soft, the moments fly,

    In shadows deep of fading light.


    The voice that sang now silenced lies,

    Yet echoes in the hearts we keep.

    A final breath, a last goodbye,

    In memories that wake and weep.


    Though darkness holds the place you knew,

    Your spirit''s flame will still ignite.

    Embers glow, forever true,

    Guiding us through endless night.


    Rest now, dear soul, beyond the pain,

    Till dawn returns to life again.'
  reward: 9
  task: Write an elegy poem expressing mourning or loss in a solemn tone with structured
    verses.
- output: "Do not go where night may steal the light (A)\nThe moon descends with silver\
    \ shade (B)\nHold fast the hope that fuels your fight (A)\n\nThough shadows stretch\
    \ beyond the sight (A)\nAnd stars above may start to fade (B)\nDo not go where\
    \ night may steal the light (A)\n\nThe wind may howl in raging might (A)\nYet\
    \ courage stands, unafraid (B)\nHold fast the hope that fuels your fight (A)\n\
    \nWhen doubts descend in endless blight (A)\nAnd dreams by fears are oft betrayed\
    \ (B)\nDo not go where night may steal the light (A)\n\nWith heart aglow, pursue\
    \ the height (A)\nThough journeys long and debts be paid (B)\nHold fast the hope\
    \ that fuels your fight (A)\n\nRemember this through darkest night (A)\nYour spirit\u2019\
    s flame will never fade (B)\nDo not go where night may steal the light (A)\nHold\
    \ fast the hope that fuels your fight (A)"
  reward: 9
  task: Create a villanelle poem with 19 lines, following the strict repetition and
    rhyme scheme.
- output: 'Upon the crimson peaks where silence dwells,

    The heroes rise with hearts aflame and bold.

    Beneath the vaulted sky where thunder swells,

    Their steadfast will outshines the gleaming gold.


    With sword in hand and armor forged by fire,

    They march through shadows cast by ancient foes.

    The roar of battle climbs, a funeral pyre,

    As legends stir where mortal courage grows.


    The earth itself shall tremble at their cry,

    While stars bear witness to their fateful quest.

    No fear to dim the steel within their eye,

    No rest until they''ve put the dark to rest.


    Great deeds inscribed in scrolls of time and stone,

    Their names alive where light and honor blend.

    Through storm and strife, their spirits stand alone,

    Immortal wills that fate itself must bend.'
  reward: 9
  task: Compose an epic poem excerpt of 20 lines incorporating heroic themes and elevated
    language.
